<!DOCTYPE html>
<html>
<head>
<title>Reservation</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="booking-header">

<h1>Renah's Restaurant</h1>
<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="booking.html">Booking</a>
<a href="contact.html">Contact</a>
</nav>
<p>Reserve your table</p>
</header>

<section class="booking">

<form class="booking-form">

<h2>Restaurant Reservation Form</h2>
<p class="subtitle">Please fill out the form below to reserve a table</p>

<div class="two-column">
<div>
<label>First Name</label>
<input type="text" placeholder="First Name">
</div>

<div>
<label>Last Name</label>
<input type="text" placeholder="Last Name">
</div>
</div>

<label>Phone Number</label>
<input type="tel" placeholder="0700000000">

<label>Email</label>
<input type="email" placeholder="Enter email">

<label>Reservation Date</label>
<input type="date">

<label>Reservation Time</label>
<input type="time">

<label>Number of Guests</label>
<select>
<option>1 Guest</option>
<option>2 Guests</option>
<option>3 Guests</option>
<option>4 Guests</option>
<option>5 Guests</option>
</select>

<label>Special Requests</label>
<textarea placeholder="Any special requests"></textarea>

<button type="submit">Reserve Table</button>

</form>

</section>
  <footer>
<p>© 2026 Renah's Restaurant</p>
</footer>

</body>
</html>
